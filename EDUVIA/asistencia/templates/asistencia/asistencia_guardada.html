{% extends 'base.html' %}
{% load static %}

{% block title %}{{ titulo }} - EDUVIA{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm text-center">
                <div class="card-body py-5">
                    <div class="mb-4">
                        <i class="fas fa-check-circle fa-5x text-success"></i>
                    </div>
                    <h3 class="text-success mb-3">¡Asistencia Registrada Exitosamente!</h3>
                    <p class="text-muted mb-4">
                        La asistencia ha sido guardada correctamente en el sistema.
                    </p>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <a href="{% url 'asistencia:seleccionar_asignatura' %}" class="btn btn-primary">
                            <i class="fas fa-plus me-2"></i>
                            Registrar Otra Asistencia
                        </a>
                        <a href="{% url 'asistencia:ver_asistencias' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-eye me-2"></i>
                            Ver Asistencias
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
